services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: horse_racing
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: horse_user
      MYSQL_PASSWORD: horse_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: horse_racing_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Horse Racing API"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:${APP_KEY:-3f6vZnbqSV6fJWj9R8V2x3k7G8L9m0Q1p2w3e4r5t6y7u8i9o0a1s2d3f4g5h6j7}
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: horse_racing
      DB_USERNAME: horse_user
      DB_PASSWORD: horse_pass
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
      SESSION_DOMAIN: localhost
      JWT_SECRET: ${JWT_SECRET:-horse_racing_super_secret_jwt_key_2026_do_not_share}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-10080}
    ports:
      - "8000:8000"
    volumes:
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage
    working_dir: /var/www/html

  websocket:
    image: php:8.2-cli
    container_name: horse_racing_websocket
    ports:
      - "8080:8080"
    volumes:
      - ./websocket-server:/var/www/html
    working_dir: /var/www/html
    command: >
      sh -c "
        apt-get update &&
        apt-get install -y git unzip &&
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer &&
        composer install &&
        php server.php
      "

volumes:
  db_data:


