services:
  backend:
    build:
      context: ./backend
    container_name: horse_racing_api
    environment:
      APP_NAME: "Horse Racing API"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:${APP_KEY:-3f6vZnbqSV6fJWj9R8V2x3k7G8L9m0Q1p2w3e4r5t6y7u8i9o0a1s2d3f4g5h6j7}
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_DATABASE: horse_racing_db
      DB_USERNAME: root
      DB_PASSWORD: root123
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
      SESSION_DOMAIN: localhost
      CACHE_DRIVER: array
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage
    working_dir: /var/www/html
    networks:
      - mysql-demo_default

networks:
  mysql-demo_default:
    external: true
